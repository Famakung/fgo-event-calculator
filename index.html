<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="FGO Calculator — Event Shop optimizer, Bond Point calculator, and Bond Gain CE filter for Fate/Grand Order farming."
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self'; style-src 'self'; script-src 'self'; font-src 'self';"
    />
    <title>FGO Calculator</title>
    <link rel="preload" href="styles.css" as="style" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preload" href="fonts/dm-sans-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="fonts/dm-sans-500.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="fonts/dm-sans-600.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="fonts/dm-sans-700.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="fonts/space-mono-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="fonts/space-mono-700.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="manifest" href="manifest.json" />
    <script defer src="data/traits.js"></script>
    <script defer src="data/servants.js"></script>
    <script defer src="data/craft_essences.js"></script>
    <script defer src="app.js"></script>
    <script defer src="register-sw.js"></script>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 class="title">FGO Calculator</h1>
        <p class="subtitle">Optimize your farming runs</p>
      </header>

      <nav class="tab-bar">
        <button class="tab-btn active" data-tab="event">Event Shop</button>
        <button class="tab-btn" data-tab="bond">Bond Calculator</button>
        <button class="tab-btn" data-tab="cefilter">Bond Gain CE Filter</button>
      </nav>

      <main id="main-content">
        <section class="tab-panel active" id="panel-event">
          <div class="card">
            <div class="card-title">Shop Requirements</div>
            <div class="materials-grid" id="materialsGrid"></div>
          </div>

          <div class="card">
            <div class="card-title">Drop Rates per Run</div>
            <div class="base-row">
              <div class="base-item">
                <label class="base-label" for="baseDrop">Base</label>
                <input
                  type="number"
                  class="input-field base-input"
                  id="baseDrop"
                  value="3"
                  min="0"
                  max="100"
                />
              </div>
              <div class="base-item">
                <label class="base-label" for="primaryMultiplier"
                  >Primary %</label
                >
                <input
                  type="number"
                  class="input-field base-input"
                  id="primaryMultiplier"
                  value="1500"
                  min="100"
                  max="100000"
                />
              </div>
              <div class="base-item">
                <label class="base-label" for="secondaryMultiplier"
                  >Secondary %</label
                >
                <input
                  type="number"
                  class="input-field base-input"
                  id="secondaryMultiplier"
                  value="225"
                  min="100"
                  max="100000"
                />
              </div>
            </div>
            <div class="quest-drops-grid" id="questDropsGrid"></div>
          </div>

          <button class="calculate-btn" id="calculateBtn" type="button">
            Calculate Quest Runs
          </button>

          <div class="results" id="results">
            <div class="card results-card">
              <div class="card-title">Items Needed</div>
              <div class="deficit-grid" id="deficitGrid"></div>

              <div class="quest-results">
                <div class="quest-title">Recommended Quest Runs</div>
                <div class="quest-grid" id="questGrid"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="tab-panel" id="panel-bond">
          <div class="card">
            <div class="card-title">Bond Points Requirements</div>
            <div class="servant-grid" id="servantGrid"></div>
          </div>

          <div class="card">
            <div class="card-title">Craft Essences Bonus</div>
            <div class="ce-grid" id="ceGrid"></div>
          </div>

          <div class="card">
            <div class="card-title">Select Quest</div>
            <div class="input-row">
              <label class="input-label" for="bondQuestSelect">Quest</label>
              <select class="select-field" id="bondQuestSelect">
                <option value="">-- Select a Quest --</option>
              </select>
            </div>
            <div id="customQuestSection" class="custom-quest-section">
              <div class="input-row">
                <label class="input-label" for="customBondPerRun"
                  >Bond/Run</label
                >
                <input
                  type="number"
                  class="input-field"
                  id="customBondPerRun"
                  min="0"
                  max="99999"
                  value="0"
                  disabled
                />
              </div>
            </div>
          </div>

          <button class="calculate-btn" id="bondCalculateBtn" type="button">
            Calculate Quest Runs
          </button>

          <div class="results" id="bondResults">
            <div class="card results-card">
              <div class="card-title">Bond Quest Runs</div>
              <div id="bondResultContent"></div>
            </div>
          </div>
        </section>

        <section class="tab-panel" id="panel-cefilter">
          <div class="card">
            <div class="card-title">Bond Gain Craft Essences</div>
            <div class="cefilter-controls">
              <button
                class="cefilter-add-btn"
                id="cefilterAddBtn"
                type="button"
              >
                Add Craft Essence
              </button>
              <div class="cefilter-mode-row">
                <label class="cefilter-mode-label" for="cefilterMode"
                  >Match Mode:</label
                >
                <select class="select-field" id="cefilterMode">
                  <option value="all" selected>Match All (AND)</option>
                  <option value="any">Match Any (OR)</option>
                  <option value="custom">Custom Match</option>
                </select>
                <div
                  id="cefilterCustomCount"
                  class="cefilter-custom-count"
                ></div>
              </div>
            </div>
            <div class="cefilter-chips" id="cefilterChips"></div>
          </div>

          <div class="card">
            <div class="card-title cefilter-results-header">
              <span>Servant CE Matching</span>
              <span class="cefilter-count" id="cefilterCount"></span>
            </div>
            <input
              type="text"
              class="servant-search ce-filter-search"
              id="cefilterSearch"
              placeholder="Search by ID or name..."
            />
            <div class="cefilter-class-filter" id="cefilterClassFilter"></div>
            <div class="cefilter-rarity-filter" id="cefilterRarityFilter"></div>
            <div
              class="cefilter-match-count-filter"
              id="cefilterMatchCount"
            ></div>
            <div class="cefilter-results-grid" id="cefilterResults"></div>
            <div class="cefilter-no-match-header" id="cefilterNoMatchHeader">
              <span>No Matching CE</span>
              <span class="cefilter-count" id="cefilterNoMatchCount"></span>
            </div>
            <div class="cefilter-results-grid" id="cefilterNoMatch"></div>
          </div>
        </section>

        <!-- Servant Selector Modal -->
        <div class="servant-modal" id="servantModal">
          <div class="servant-modal-content">
            <div class="servant-modal-header">
              <input
                type="text"
                class="servant-search"
                id="servantSearch"
                placeholder="Search by ID or name..."
              />
              <button
                class="servant-modal-close"
                id="servantModalClose"
                type="button"
              >
                &#10005;
              </button>
            </div>
            <div class="servant-class-filter" id="servantClassFilter"></div>
            <div class="servant-rarity-filter" id="servantRarityFilter"></div>
            <div class="servant-picker-grid" id="servantPickerGrid"></div>
          </div>
        </div>

        <!-- Ascension Selector Modal -->
        <div class="servant-modal" id="ascensionModal">
          <div class="servant-modal-content">
            <div class="servant-modal-header">
              <button
                class="ascension-modal-back"
                id="ascensionModalBack"
                type="button"
              >
                &#8592;
              </button>
              <span
                class="ascension-modal-title"
                id="ascensionModalTitle"
              ></span>
              <button
                class="servant-modal-close"
                id="ascensionModalClose"
                type="button"
              >
                &#10005;
              </button>
            </div>
            <div class="servant-picker-grid" id="ascensionPickerGrid"></div>
          </div>
        </div>

        <!-- CE Selector Modal -->
        <div class="servant-modal" id="ceModal">
          <div class="servant-modal-content">
            <div class="servant-modal-header">
              <input
                type="text"
                class="servant-search"
                id="ceSearch"
                placeholder="Search by ID or name..."
              />
              <button
                class="servant-modal-close"
                id="ceModalClose"
                type="button"
              >
                &#10005;
              </button>
            </div>
            <div class="servant-picker-grid" id="cePickerGrid"></div>
          </div>
        </div>

        <!-- CE Sub-Selector Modal -->
        <div class="servant-modal" id="ceSubModal">
          <div class="servant-modal-content">
            <div class="servant-modal-header">
              <button
                class="ascension-modal-back"
                id="ceSubModalBack"
                type="button"
              >
                &#8592;
              </button>
              <span class="ascension-modal-title" id="ceSubModalTitle"></span>
              <button
                class="servant-modal-close"
                id="ceSubModalClose"
                type="button"
              >
                &#10005;
              </button>
            </div>
            <div class="servant-picker-grid" id="ceSubPickerGrid"></div>
          </div>
        </div>

        <!-- CE Filter Picker Modal -->
        <div class="servant-modal" id="ceFilterModal">
          <div class="servant-modal-content">
            <div class="servant-modal-header">
              <input
                type="text"
                class="servant-search"
                id="ceFilterSearch"
                placeholder="Search by ID or name..."
              />
              <button
                class="servant-modal-close"
                id="ceFilterModalClose"
                type="button"
              >
                &#10005;
              </button>
            </div>
            <div class="servant-picker-grid" id="ceFilterPickerGrid"></div>
            <div class="cefilter-modal-footer">
              <button
                class="calculate-btn cefilter-confirm-btn"
                id="cefilterConfirmBtn"
                type="button"
              >
                Confirm Selection
              </button>
            </div>
          </div>
        </div>

        <!-- CE Overlap Modal -->
        <div class="servant-modal" id="ceOverlapModal">
          <div class="servant-modal-content">
            <div class="servant-modal-header">
              <span
                class="ascension-modal-title"
                id="ceOverlapTitle"
              ></span>
              <button
                class="servant-modal-close"
                id="ceOverlapClose"
                type="button"
              >
                &#10005;
              </button>
            </div>
            <div class="ceoverlap-groups" id="ceOverlapGroups"></div>
          </div>
        </div>
      </main>

      <footer class="footer">FGO Calculator</footer>
    </div>

  </body>
</html>
